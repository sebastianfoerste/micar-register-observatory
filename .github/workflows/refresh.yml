name: refresh

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run pytest -q
      - run: uv run python -m observatory refresh
      - name: Commit and push if the register moved
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data README.md docs/feed.json
          git diff --cached --quiet && echo "no register changes" && exit 0
          git commit -m "chore: weekly register refresh"
          git push
