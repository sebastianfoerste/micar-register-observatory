name: Verify white-paper content

on:
  schedule:
    - cron: "35 4 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Unchecked URLs to inspect; use 0 for every remaining URL"
        required: true
        default: "50"
      timeout:
        description: "Per-request timeout in seconds"
        required: true
        default: "30"

permissions:
  contents: write

concurrency:
  group: micar-register-content-verification
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Test verification logic
        run: python -m pytest -q

      - name: Verify a bounded batch
        env:
          LIMIT: ${{ github.event.inputs.limit || '50' }}
          REQUEST_TIMEOUT: ${{ github.event.inputs.timeout || '30' }}
        run: >-
          python -m observatory verify-content
          --limit "$LIMIT"
          --timeout "$REQUEST_TIMEOUT"
          --delay 0.5
          --retry-failures

      - name: Commit evidence update
        run: |
          if git diff --quiet; then
            echo "No content-verification changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/feed.json data/latest.json data/snapshots/
          git commit -m "data: update content-verification evidence"
          git push
